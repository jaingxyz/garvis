name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-audit:
    name: lint + test + audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      # Hash-pinned install (Scorecard Pinned-Dependencies): every dependency is
      # locked by version + sha256 in requirements-ci.txt. Regenerate with:
      #   uv pip compile requirements-ci.in --universal --generate-hashes -o requirements-ci.txt
      - name: Install (hash-pinned)
        run: pip install --require-hashes -r requirements-ci.txt

      - name: Lint (ruff)
        run: ruff check .

      # garvis is imported from the source tree (PYTHONPATH=.) rather than installed,
      # because an editable/local install can never be hash-pinned.
      - name: Test (pytest)
        run: pytest -q
        env:
          PYTHONPATH: .

      - name: Audit dependencies (pip-audit)
        run: pip-audit
