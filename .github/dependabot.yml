version: 2
updates:
  # Python dependencies (pyproject.toml + requirements*.txt).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions. Workflows pin to commit SHAs; Dependabot bumps the SHA
  # (and its version comment) in lockstep with the tag's underlying commit.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
